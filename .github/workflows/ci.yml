name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install ruff mypy pydantic-settings pydantic fastapi

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy app/

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wizly
          POSTGRES_PASSWORD: wizly
          POSTGRES_DB: wizly
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://wizly:wizly@localhost:5432/wizly
      JWT_SECRET_KEY: ci-test-secret
      SECRET_KEY: ci-test-secret
      POSTGRES_USER: wizly
      POSTGRES_PASSWORD: wizly
      POSTGRES_DB: wizly
      LITELLM_API_KEY: sk-fake-key-for-ci
      DEBUG: "true"
      QDRANT_URL: http://localhost:6333
      AWS_ACCESS_KEY_ID: ci
      AWS_SECRET_ACCESS_KEY: ci
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://127.0.0.1:4566
      S3_BUCKET_NAME: wizly-ci
      SKIP_CHUNKER_WARMUP: "true"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80
        continue-on-error: true  # tests skipped until Phase 1 models exist

  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  security-check:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install safety
        run: pip install safety

      - name: Safety check
        run: safety check -r requirements.txt
        continue-on-error: true
